<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kharkiv Explorer 2026 | Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --text: #f1f5f9; --accent: #10b981; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; background-color: var(--bg); color: var(--text); }
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        #power-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--primary); color: white; padding: 20px 40px; font-size: 1.1rem; border-radius: 12px; cursor: pointer; }
        #main-content { display: none; padding: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        #admin-section { display: none; background: rgba(0,210,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--primary); }
        input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 10px; color: white; border-radius: 5px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        .btn-action { background: var(--accent); color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .lock-icon { position: fixed; bottom: 20px; right: 20px; cursor: pointer; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="preloader">
        <button id="power-btn" onclick="startLoading()">ПОЕХАЛИ!</button>
        <div id="loader-status" style="margin-top:20px; color: var(--primary);">0%</div>
    </div>

    <div id="main-content">
        <h2 style="text-align:center; color: var(--primary);">MOTO JOURNAL 2026</h2>
        
        <div class="stats-grid">
            <div class="stat-card"><small>Путь</small><div id="stat-dist" style="font-size:1.2rem; font-weight:bold;">0 км</div></div>
            <div class="stat-card"><small>Выездов</small><div id="stat-count" style="font-size:1.2rem; font-weight:bold;">0</div></div>
        </div>

        <div id="admin-section">
            <input type="text" id="inp-district" placeholder="Район / Маршрут">
            <input type="date" id="inp-date">
            <input type="number" id="inp-km" placeholder="Километры">
            <input type="number" id="inp-time" placeholder="Минуты в пути">
            <button class="btn-action" onclick="handleSave()">СОХРАНИТЬ В ОБЛАКО</button>
        </div>

        <table>
            <thead><tr><th>Маршрут</th><th>Дата</th><th>Км</th><th></th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div class="lock-icon" onclick="adminLogin()">🔒</div>

    <script>
        // ТВОИ КЛЮЧИ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDSfkUr0qnsR3054L7NtyC2NWOnpNCmOvg",
            authDomain: "velojournall.firebaseapp.com",
            databaseURL: "https://velojournall-default-rtdb.firebaseio.com",
            projectId: "velojournall",
            storageBucket: "velojournall.appspot.com",
            messagingSenderId: "282868917010",
            appId: "1:282868917010:web:de000212f41f5ee31cc0eb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let isAdmin = false;
        let myTrips = [];

        function startLoading() {
            let count = 0;
            const status = document.getElementById('loader-status');
            const interval = setInterval(() => {
                count += 10;
                status.innerText = count + '%';
                if(count >= 100) {
                    clearInterval(interval);
                    document.getElementById('preloader').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                    loadData();
                }
            }, 50);
        }

        function adminLogin() {
            if(prompt("Пароль:") === "1234") {
                isAdmin = true;
                document.getElementById('admin-section').style.display = 'block';
            }
        }

        function loadData() {
            db.ref('trips').on('value', (snapshot) => {
                myTrips = snapshot.val() || [];
                renderTable();
            });
        }

        function handleSave() {
            const newTrip = {
                id: Date.now(),
                district: document.getElementById('inp-district').value,
                date: document.getElementById('inp-date').value,
                km: Number(document.getElementById('inp-km').value),
                time: Number(document.getElementById('inp-time').value)
            };
            myTrips.push(newTrip);
            db.ref('trips').set(myTrips);
            alert("Сохранено!");
        }

        function deleteTrip(id) {
            if(!isAdmin) return;
            myTrips = myTrips.filter(t => t.id !== id);
            db.ref('trips').set(myTrips);
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = "";
            let totalKm = 0;
            myTrips.forEach(t => {
                totalKm += t.km;
                tbody.innerHTML += `<tr>
                    <td>${t.district}</td>
                    <td>${t.date}</td>
                    <td>${t.km} км</td>
                    <td>${isAdmin ? `<button onclick="deleteTrip(${t.id})">🗑</button>` : ''}</td>
                </tr>`;
            });
            document.getElementById('stat-dist').innerText = totalKm + " км";
            document.getElementById('stat-count').innerText = myTrips.length;
        }
    </script>
</body>
</html>
